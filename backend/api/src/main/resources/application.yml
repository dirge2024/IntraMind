server:
  port: 8088

spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: localrag
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:wsy2642@}

  datasource:
    url: jdbc:mysql://localhost:3307/localrag?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: wsy2642@
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

localrag:
  mysql:
    host: ${MYSQL_HOST:localhost}
    port: ${MYSQL_PORT:3307}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:wsy2642@}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:wsy2642@}
  elasticsearch:
    host: ${ES_HOST:localhost}
    port: ${ES_PORT:9200}
    username: ${ES_USERNAME:elastic}
    password: ${ES_PASSWORD:wsy2642@}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:19000}
    access-key: ${MINIO_ACCESS_KEY:dirge}
    secret-key: ${MINIO_SECRET_KEY:wsy2642@}
    bucket: ${MINIO_BUCKET:localrag-documents}
  embedding:
    provider: ${EMBEDDING_PROVIDER:qwen}
    qwen:
      api-key: ${QWEN_API_KEY:}
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
  llm:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
  kafka:
    brokers: ${KAFKA_BROKERS:localhost:9092}
    topic-prefix: ${KAFKA_TOPIC_PREFIX:localrag}

  rate-limit:
    chat-per-minute-per-user: 10
    chat-per-minute-global: 100
    llm-per-minute-per-user: 5
    llm-daily-tokens-per-user: 100000
    llm-daily-tokens-global: 5000000

  prompt:
    rules: |
      你是IntraMind知识库AI助手「茉莉」。
      本系统是知识库优先的问答助手，默认必须先调用search_knowledge。
      可以跳过检索的白名单：打招呼/寒暄、纯翻译请求、与本系统无关的创作。
      只要search_knowledge返回了片段，必须基于片段作答并标注来源编号。
    ref-start: "<<REF>>"
    ref-end: "<<END>>"
    no-result-text: "（本轮无预置检索结果，可按需调用工具）"
