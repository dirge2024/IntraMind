<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>知识库 — LocalRAG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fefefe; color: #222; display: flex; min-height: 100vh; }
.sidebar { padding: 24px 20px; display: flex; flex-direction: column; gap: 4px; background: #f0f7ff; border-right: 1px solid #dceaf5; flex-shrink: 0; }
.sidebar .brand { font-size: 15px; font-weight: 700; color: #1e3a5f; margin-bottom: 12px; }
.sidebar a { display: block; padding: 7px 14px; color: #3b6ba5; text-decoration: none; font-size: 13.5px; border-radius: 6px; white-space: nowrap; transition: .15s; }
.sidebar a:hover { background: #dceaf5; }
.sidebar a.active { background: #2563eb; color: #fff; font-weight: 600; }
.main { flex: 1; }
.topbar { padding: 14px 28px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
.topbar h1 { font-size: 16px; font-weight: 600; }
.content { padding: 28px; max-width: 960px; }
.btn { padding: 7px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-primary { background: #2563eb; color: #fff; } .btn-primary:hover { background: #1d4ed8; }
.btn-ghost { background: none; border: 1px solid #ddd; color: #666; padding: 5px 12px; font-size: 12px; margin-left: 8px; border-radius: 6px; }
.btn-danger { background: none; color: #e53e3e; font-size: 12px; padding: 4px 10px; }
.btn-danger:hover { background: #fff5f5; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #eee; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: #aaa; }
tbody td { padding: 12px; border-bottom: 1px solid #f5f5f5; }
tbody tr:hover { background: #fafcfd; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 100px; font-size: 11.5px; font-weight: 600; }
.badge-uploading { background: #e8f0fe; color: #1e40af; }
.badge-ready { background: #fef9e7; color: #92400e; }
.badge-chunked { background: #fff3e0; color: #9a3412; }
.badge-embedded { background: #e8f5e9; color: #1b5e20; }
.note { text-align: center; padding: 40px 0; color: #aaa; font-size: 14px; }
</style>
</head>
<body>
<div class="sidebar">
    <div class="brand">LocalRAG</div>
    <a href="/upload.html">上传文件</a>
    <a href="/kb.html" class="active">知识库</a>
    <a href="/chat.html">对话</a>
</div>
<div class="main">
    <div class="topbar">
        <h1>知识库</h1>
        <button class="btn btn-primary" onclick="loadFiles()">刷新列表</button>
    </div>
    <div class="content">
        <table>
            <thead><tr><th>文件名</th><th>MD5</th><th>大小</th><th>状态</th><th>时间</th><th></th></tr></thead>
            <tbody id="fileList"><tr><td colspan="6" class="note">加载中&hellip;</td></tr></tbody>
        </table>
    </div>
</div>
<script>
async function loadFiles(){
    const tbody=document.getElementById('fileList');
    try{
        const r=await fetch('/api/storage/files');const d=await r.json();
        if(d.code!==200){tbody.innerHTML='<tr><td colspan="6" class="note">加载失败</td></tr>';return;}
        const files=(d.data||[]).filter(f=>f.status!=='DELETED');
        if(!files.length){tbody.innerHTML='<tr><td colspan="6" class="note">暂无文件，请先上传</td></tr>';return;}
        tbody.innerHTML=files.map(f=>'<tr>'+
            '<td><strong>'+esc(f.fileName)+'</strong></td>'+
            '<td style="font-family:monospace;font-size:11px;color:#aaa;">'+esc(f.md5).substring(0,12)+'&hellip;</td>'+
            '<td>'+formatSize(f.fileSize)+'</td>'+
            '<td><span class="badge badge-'+f.status.toLowerCase()+'">'+statusText(f.status)+'</span></td>'+
            '<td style="font-size:12px;color:#aaa;">'+f.createdAt+'</td>'+
            '<td style="text-align:right;">'+
                '<a href="/api/storage/download/'+f.md5+'" class="btn btn-ghost">下载</a>'+
                '<button class="btn btn-danger" onclick="deleteFile(\''+f.md5+'\')">删除</button>'+
            '</td>'+
        '</tr>').join('');
    }catch(e){tbody.innerHTML='<tr><td colspan="6" class="note">请求失败</td></tr>';}
}
async function deleteFile(md5){if(!confirm('确认删除？'))return;await fetch('/api/storage/file/'+md5,{method:'DELETE'});loadFiles();}
function statusText(s){const m={'UPLOADING':'上传中','READY':'已上传','CHUNKED':'已分块','EMBEDDED':'已入库','DELETED':'已删除'};return m[s]||s;}
function formatSize(b){const KB=1024,MB=1024*KB;if(b<KB)return b+' B';if(b<MB)return(b/KB).toFixed(1)+' KB';return(b/MB).toFixed(1)+' MB';}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
loadFiles();
</script>
</body>
</html>
