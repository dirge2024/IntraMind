<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>知识库 — LocalRAG</title>
<link rel="stylesheet" href="/common.css">
<style>
.content { flex: 1; padding: 28px; max-width: 960px; }
.btn-ghost { background: #fff; border: 1px solid #e0e0e0; color: #666; padding: 6px 14px; font-size: 12px; margin-left: 8px; border-radius: 10px; cursor: pointer; }
.btn-danger { background: none; color: #e53e3e; font-size: 12px; padding: 5px 12px; cursor: pointer; border: none; }
.btn-danger:hover { background: #fff5f5; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #f0f0f5; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: #aaa; }
tbody td { padding: 12px; border-bottom: 1px solid #f8f8fa; color: #444; }
tbody tr:hover { background: #fafafe; }
.note { text-align: center; padding: 40px 0; color: #bbb; font-size: 14px; }
</style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><div class="logo">R</div>LocalRAG</div>
    <nav>
        <a href="/upload.html">&#128196; 文件上传</a>
        <a href="/kb.html" class="active">&#128451; 知识库</a>
        <a href="/chat.html">&#128172; 对话助手</a>
        <a href="/sessions.html">&#128337; 历史会话</a>
    </nav>
</div>
<div class="main">
    <div class="topbar">
        <h1>知识库</h1>
        <button class="btn btn-primary" onclick="loadFiles()">刷新列表</button>
    </div>
    <div class="content">
        <table>
            <thead><tr><th>文件名</th><th>MD5</th><th>大小</th><th>状态</th><th>时间</th><th></th></tr></thead>
            <tbody id="fileList"><tr><td colspan="6" class="note">加载中&hellip;</td></tr></tbody>
        </table>
    </div>
</div>
<script>
function showConfirm(msg) { return new Promise(r => { const ov = document.createElement('div'); ov.className = 'modal-overlay'; ov.innerHTML = '<div class="modal-box"><p>'+msg+'</p><div class="btns"><button class="btn-cancel">取消</button><button class="btn-ok">确定</button></div></div>'; ov.querySelector('.btn-cancel').onclick = () => { ov.remove(); r(false); }; ov.querySelector('.btn-ok').onclick = () => { ov.remove(); r(true); }; document.body.appendChild(ov); }); }
async function loadFiles(){
    const tbody=document.getElementById('fileList');
    try{const r=await fetch('/api/storage/files');const d=await r.json();if(d.code!==200){tbody.innerHTML='<tr><td colspan="6" class="note">加载失败</td></tr>';return;}
    const files=(d.data||[]).filter(f=>f.status!=='DELETED');if(!files.length){tbody.innerHTML='<tr><td colspan="6" class="note">暂无文件</td></tr>';return;}
    tbody.innerHTML=files.map(f=>'<tr><td><strong>'+esc(f.fileName)+'</strong></td><td style="font-family:monospace;font-size:11px;color:#bbb;">'+esc(f.md5).substring(0,12)+'&hellip;</td><td>'+formatSize(f.fileSize)+'</td><td><span class="badge badge-'+f.status.toLowerCase()+'">'+statusText(f.status)+'</span></td><td style="font-size:12px;color:#bbb;">'+f.createdAt+'</td><td style="text-align:right;"><a href="/api/storage/download/'+f.md5+'" class="btn btn-ghost">下载</a><button class="btn btn-danger" onclick="deleteFile(\''+f.md5+'\')">删除</button></td></tr>').join('');
    }catch(e){tbody.innerHTML='<tr><td colspan="6" class="note">请求失败</td></tr>';}
}
async function deleteFile(md5){if(!await showConfirm('确认删除此文件？'))return;await fetch('/api/storage/file/'+md5,{method:'DELETE'});loadFiles();}
function statusText(s){const m={'UPLOADING':'上传中','READY':'已上传','CHUNKED':'已分块','EMBEDDED':'已入库','DELETED':'已删除'};return m[s]||s;}
function formatSize(b){const KB=1024,MB=1024*KB;if(b<KB)return b+' B';if(b<MB)return(b/KB).toFixed(1)+' KB';return(b/MB).toFixed(1)+' MB';}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
loadFiles();
</script>
</body>
</html>
