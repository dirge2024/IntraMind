<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>对话 — LocalRAG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', system-ui, sans-serif; background: #f0f2f8; color: #333; height: 100vh; padding: 16px; display: flex; gap: 16px; overflow: hidden; }
.sidebar { width: 240px; background: #fff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
.sidebar .brand { display: flex; align-items: center; gap: 10px; padding: 18px 16px 14px; font-size: 16px; font-weight: 700; border-bottom: 1px solid #f2f2f7; flex-shrink: 0; }
.sidebar .brand .ico { width: 30px; height: 30px; background: #7c3aed; border-radius: 9px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 15px; font-weight: 700; }
.sidebar .nav-top { padding: 6px 10px; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
.sidebar .nav-top a { display: flex; align-items: center; gap: 8px; padding: 9px 12px; color: #555; text-decoration: none; font-size: 14px; border-radius: 10px; transition: .15s; }
.sidebar .nav-top a:hover { background: #f5f3ff; color: #7c3aed; }
.sidebar .nav-top a.active { background: #ede9fe; color: #7c3aed; font-weight: 600; }
.main { flex: 1; background: #fafaff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04); display: flex; flex-direction: column; overflow: hidden; }
.topbar { background: #fff; padding: 14px 28px; border-bottom: 1px solid #f2f2f7; display: flex; align-items: center; flex-shrink: 0; }
.topbar h1 { font-size: 16px; font-weight: 600; }
.chat-area { flex: 1; overflow-y: auto; padding: 24px 28px 12px; display: flex; flex-direction: column; gap: 14px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.7; animation: fadeIn .3s; word-break: break-word; }
.msg.user { align-self: flex-end; background: #7c3aed; color: #fff; }
.msg.assistant { align-self: flex-start; background: #fff; color: #333; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.msg.assistant.typing { opacity: .6; }
.bottom-bar { background: #fff; border-top: 1px solid #f0f0f5; padding: 16px 28px; display: flex; gap: 8px; flex-shrink: 0; }
.bottom-bar input { flex: 1; padding: 11px 16px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; color: #333; }
.bottom-bar input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.08); }
.btn { padding: 11px 24px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: .15s; }
.btn-primary { background: #7c3aed; color: #fff; } .btn-primary:hover { background: #6d28d9; }
.btn-primary:disabled { background: #e0e0e0; color: #aaa; cursor: not-allowed; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; z-index: 999; animation: fadeIn .15s; }
.modal-box { background: #fff; border-radius: 14px; padding: 28px 32px; width: 360px; box-shadow: 0 8px 30px rgba(0,0,0,.12); text-align: center; }
.modal-box p { font-size: 15px; margin-bottom: 24px; color: #333; line-height: 1.6; }
.modal-box .btns { display: flex; gap: 10px; justify-content: center; }
.modal-box .btns button { padding: 9px 28px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
.modal-box .btn-ok { background: #e53e3e; color: #fff; } .modal-box .btn-ok:hover { background: #dc2626; }
.modal-box .btn-cancel { background: #f4f4f5; color: #52525b; } .modal-box .btn-cancel:hover { background: #e4e4e7; }
</style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><div class="ico">R</div>LocalRAG</div>
    <div class="nav-top">
        <a href="/upload.html">&#128196; 文件上传</a>
        <a href="/kb.html">&#128451; 知识库</a>
        <a href="/chat.html" class="active">&#128172; 对话助手</a>
        <a href="/sessions.html">&#128337; 历史会话</a>
    </div>
    <div class="new-chat"><button onclick="newChat()">+ 新对话</button></div>
</div>
<div class="main">
    <div class="topbar"><h1 id="chatTitle">对话助手</h1></div>
    <div class="chat-area" id="chatBox"><div style="text-align:center;color:#bbb;padding:60px 0;">点击「+ 新对话」开始</div></div>
    <div class="bottom-bar">
        <input type="text" id="question" placeholder="输入问题，回车发送..." onkeydown="if(event.key==='Enter')send()">
        <button class="btn btn-primary" id="btnSend" onclick="send()">发送</button>
    </div>
</div>
<script>
function showConfirm(msg) { return new Promise(r => { const ov = document.createElement('div'); ov.className = 'modal-overlay'; ov.innerHTML = '<div class="modal-box"><p>'+msg+'</p><div class="btns"><button class="btn-cancel">取消</button><button class="btn-ok">确定</button></div></div>'; ov.querySelector('.btn-cancel').onclick = () => { ov.remove(); r(false); }; ov.querySelector('.btn-ok').onclick = () => { ov.remove(); r(true); }; document.body.appendChild(ov); }); }

const params = new URLSearchParams(window.location.search);
let sessionId = params.get('session') || null;
let streaming = false;

(async function() {
    if (!sessionId) {
        const r = await fetch('/api/llm/sessions');
        const d = await r.json();
        if (d.code === 200 && d.data && d.data.length > 0) {
            sessionId = d.data[0].sessionId;
            history.replaceState(null, '', '?session=' + sessionId);
        } else {
            sessionId = null;
        }
    }
    if (sessionId) loadHistory();
})();

async function newChat(){const r=await fetch('/api/llm/sessions',{method:'POST'});const d=await r.json();if(d.code===200&&d.data)window.location.href='?session='+d.data.sessionId;}

function send() {
    if (!sessionId) { alert('请先创建会话'); return; }
    const input = document.getElementById('question'); const query = input.value.trim();
    if (!query || streaming) return;
    input.value = ''; streaming = true; document.getElementById('btnSend').disabled = true;
    const box = document.getElementById('chatBox');
    if (!box.querySelector('.msg')) box.innerHTML = '';
    const userDiv = document.createElement('div'); userDiv.className = 'msg user'; userDiv.textContent = query; box.appendChild(userDiv);
    const assistantDiv = document.createElement('div'); assistantDiv.className = 'msg assistant typing'; box.appendChild(assistantDiv);
    box.scrollTop = box.scrollHeight;
    const es = new EventSource('/api/llm/chat?query='+encodeURIComponent(query)+'&sessionId='+sessionId);
    es.onmessage = function(e) {
        try { const d = JSON.parse(e.data); if(d.done){es.close();finish();return;} if(d.content){assistantDiv.textContent+=d.content;box.scrollTop=box.scrollHeight;} } catch(x){}
    };
    es.onerror = function() { es.close(); if(assistantDiv.textContent.length===0){assistantDiv.textContent='连接中断';assistantDiv.className='msg error';} finish(); };
    function finish() { streaming=false; document.getElementById('btnSend').disabled=false; assistantDiv.classList.remove('typing'); }
}

function loadHistory() {
    if (!sessionId) return;
    fetch('/api/llm/history?sessionId='+sessionId).then(r=>r.json()).then(d=>{
        const box = document.getElementById('chatBox'); box.innerHTML = '';
        if(d.code===200&&d.data)d.data.forEach(m=>{const div=document.createElement('div');div.className='msg '+m.role;div.textContent=m.content||'';box.appendChild(div);});
        box.scrollTop=box.scrollHeight;
    });
}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
</script>
</body>
</html>
