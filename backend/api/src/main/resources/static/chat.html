<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>对话 — LocalRAG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', system-ui, sans-serif; background: #f0f2f8; color: #333; height: 100vh; padding: 16px; display: flex; gap: 16px; overflow: hidden; }
.sidebar { width: 200px; background: #fff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04); padding: 24px 16px; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar .brand { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; color: #333; margin-bottom: 28px; padding: 0 8px; }
.sidebar .brand .ico { width: 30px; height: 30px; background: #7c3aed; border-radius: 9px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 15px; font-weight: 700; }
.sidebar nav { display: flex; flex-direction: column; gap: 2px; }
.sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: #555; text-decoration: none; font-size: 14px; border-radius: 10px; transition: .15s; }
.sidebar nav a:hover { background: #f5f3ff; color: #7c3aed; }
.sidebar nav a.active { background: #ede9fe; color: #7c3aed; font-weight: 600; }
.sidebar nav a .ico-sm { font-size: 17px; width: 22px; text-align: center; }
.main { flex: 1; background: #fafaff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04); display: flex; flex-direction: column; overflow: hidden; }
.topbar { background: #fff; padding: 14px 28px; border-bottom: 1px solid #f2f2f7; display: flex; align-items: center; flex-shrink: 0; }
.topbar h1 { font-size: 16px; font-weight: 600; }
.chat-area { flex: 1; overflow-y: auto; padding: 24px 28px 12px; display: flex; flex-direction: column; gap: 14px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.7; animation: fadeIn .3s; word-break: break-word; }
.msg.user { align-self: flex-end; background: #7c3aed; color: #fff; }
.msg.assistant { align-self: flex-start; background: #fff; color: #333; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.msg.assistant.typing { opacity: .6; }
.msg.error { align-self: flex-start; background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
.bottom-bar { background: #fff; border-top: 1px solid #f0f0f5; padding: 16px 28px; display: flex; gap: 8px; flex-shrink: 0; }
.bottom-bar input { flex: 1; padding: 11px 16px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; color: #333; }
.bottom-bar input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.08); }
.btn { padding: 11px 24px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: .15s; }
.btn-primary { background: #7c3aed; color: #fff; } .btn-primary:hover { background: #6d28d9; }
.btn-primary:disabled { background: #e0e0e0; color: #aaa; cursor: not-allowed; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><div class="ico">R</div>LocalRAG</div>
    <nav>
        <a href="/upload.html"><span class="ico-sm">&#128196;</span>文件上传</a>
        <a href="/kb.html"><span class="ico-sm">&#128451;</span>知识库</a>
        <a href="/chat.html" class="active"><span class="ico-sm">&#128172;</span>对话助手</a>
    </nav>
</div>
<div class="main">
    <div class="topbar"><h1>对话助手</h1></div>
    <div class="chat-area" id="chatBox"></div>
    <div class="bottom-bar">
        <input type="text" id="question" placeholder="输入问题，回车发送..." onkeydown="if(event.key==='Enter')send()">
        <button class="btn btn-primary" id="btnSend" onclick="send()">发送</button>
    </div>
</div>
<script>
const sessionId = localStorage.getItem('rag_session') || ('sess_' + Date.now());
localStorage.setItem('rag_session', sessionId);
let streaming = false;

function send() {
    const input = document.getElementById('question');
    const query = input.value.trim();
    if (!query || streaming) return;
    input.value = '';
    streaming = true;
    document.getElementById('btnSend').disabled = true;

    appendMessage('user', query);
    const assistantDiv = appendMessage('assistant', '', true);

    fetch('/api/llm/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, sessionId })
    }).then(response => {
        if (!response.ok) { throw new Error('HTTP ' + response.status); }
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        function read() {
            reader.read().then(({ done, value }) => {
                if (done) { finish(); return; }
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const d = JSON.parse(line.substring(6));
                            if (d.done) { finish(); return; }
                            if (d.content) {
                                assistantDiv.textContent += d.content;
                                document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
                setTimeout(read, 0);
            }).catch(err => { assistantDiv.textContent = '读取失败: ' + err.message; finish(); });
        }
        function finish() { streaming = false; document.getElementById('btnSend').disabled = false; assistantDiv.classList.remove('typing'); }
        read();
    }).catch(err => {
        assistantDiv.textContent = '请求失败: ' + err.message;
        assistantDiv.className = 'msg error';
        streaming = false;
        document.getElementById('btnSend').disabled = false;
    });
}

function appendMessage(role, text, typing) {
    const box = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = 'msg ' + role + (typing ? ' typing' : '');
    div.textContent = text || '';
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
}

function loadHistory() {
    fetch('/api/llm/history?sessionId=' + sessionId)
        .then(r => r.json())
        .then(d => {
            document.getElementById('chatBox').innerHTML = '';
            if (d.code === 200 && d.data) {
                d.data.forEach(msg => appendMessage(msg.role, msg.content));
            }
        });
}
loadHistory();
</script>
</body>
</html>
