<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>对话 — LocalRAG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fefefe; color: #222; display: flex; min-height: 100vh; }
.sidebar { padding: 24px 20px; display: flex; flex-direction: column; gap: 4px; background: #f0f7ff; border-right: 1px solid #dceaf5; flex-shrink: 0; }
.sidebar .brand { font-size: 15px; font-weight: 700; color: #1e3a5f; margin-bottom: 12px; }
.sidebar a { display: block; padding: 7px 14px; color: #3b6ba5; text-decoration: none; font-size: 13.5px; border-radius: 6px; white-space: nowrap; transition: .15s; }
.sidebar a:hover { background: #dceaf5; }
.sidebar a.active { background: #2563eb; color: #fff; font-weight: 600; }
.main { flex: 1; }
.topbar { padding: 14px 28px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; }
.topbar h1 { font-size: 16px; font-weight: 600; }
.content { padding: 28px; max-width: 760px; }
.chat-box { border: 1px solid #eee; border-radius: 8px; padding: 20px; min-height: 320px; max-height: 480px; overflow-y: auto; margin-bottom: 12px; background: #fff; }
.row { display: flex; gap: 8px; }
.row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
.row input:focus { border-color: #2563eb; }
.btn { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-primary { background: #2563eb; color: #fff; } .btn-primary:hover { background: #1d4ed8; }
.btn-primary:disabled { background: #e0e0e0; color: #aaa; cursor: not-allowed; }
.note { text-align: center; padding: 40px 0; color: #aaa; font-size: 14px; line-height: 2; }
</style>
</head>
<body>
<div class="sidebar">
    <div class="brand">LocalRAG</div>
    <a href="/upload.html">上传文件</a>
    <a href="/kb.html">知识库</a>
    <a href="/chat.html" class="active">对话</a>
</div>
<div class="main">
    <div class="topbar"><h1>对话</h1></div>
    <div class="content">
        <div class="chat-box">
            <div class="note">retrieval + llm 模块开发中<br><small style="font-size:12px;">入链已贯通：上传 → 解析 → 向量化 → 入库</small></div>
        </div>
        <div class="row">
            <input type="text" id="question" placeholder="输入问题..." disabled>
            <button class="btn btn-primary" disabled>发送</button>
        </div>
    </div>
</div>
</body>
</html>
