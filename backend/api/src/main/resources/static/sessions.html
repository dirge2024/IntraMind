<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>历史会话 — LocalRAG</title>
<link rel="stylesheet" href="/common.css">
<style>
.content { flex: 1; padding: 24px 28px; overflow-y: auto; }
.filters { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
.filters input { padding: 8px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; background: #fff; color: #333; font-family: inherit; }
.filters input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.08); }
.filters input[type="date"] { width: 145px; cursor: pointer; }
.filters .date-sep { color: #aaa; font-size: 13px; }
.session-card { background: #fff; border: 1px solid #f0f0f5; border-radius: 10px; padding: 14px 18px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: .1s; }
.session-card:hover { border-color: #ddd6fe; box-shadow: 0 2px 6px rgba(0,0,0,.04); }
.session-card .info { flex: 1; min-width: 0; }
.session-card .title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.session-card .meta { font-size: 12px; color: #aaa; }
.session-card .actions { display: flex; gap: 4px; flex-shrink: 0; }
.btn-sm { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; }
.btn-ghost { background: none; color: #888; } .btn-ghost:hover { background: #f4f4f5; }
.btn-del { background: none; color: #e53e3e; } .btn-del:hover { background: #fee2e2; }
.btn-pin { color: #f59e0b; }
.note { text-align: center; color: #bbb; padding: 40px; font-size: 14px; }
</style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><div class="logo">R</div>LocalRAG</div>
    <nav>
        <a href="/upload.html">&#128196; 文件上传</a>
        <a href="/kb.html">&#128451; 知识库</a>
        <a href="/chat.html">&#128172; 对话助手</a>
        <a href="/sessions.html" class="active">&#128337; 历史会话</a>
    </nav>
</div>
<div class="main">
    <div class="topbar"><h1>历史会话</h1></div>
    <div class="content">
        <div class="filters">
            <input type="text" id="search" placeholder="搜索会话标题..." oninput="render()">
            <input type="date" id="dateFrom" onchange="render()" placeholder="开始日期">
            <span class="date-sep">至</span>
            <input type="date" id="dateTo" onchange="render()" placeholder="结束日期">
        </div>
        <div id="list"></div>
    </div>
</div>
<script>
function showConfirm(msg) { return new Promise(r => { const ov = document.createElement('div'); ov.className = 'modal-overlay'; ov.innerHTML = '<div class="modal-box"><p>'+msg+'</p><div class="btns"><button class="btn-cancel">取消</button><button class="btn-ok">确定</button></div></div>'; ov.querySelector('.btn-cancel').onclick = () => { ov.remove(); r(false); }; ov.querySelector('.btn-ok').onclick = () => { ov.remove(); r(true); }; document.body.appendChild(ov); }); }
let allSessions = [];
async function load(){const r=await fetch('/api/llm/sessions');const d=await r.json();allSessions=d.code===200?(d.data||[]):[];render();}
function render(){
    const search=(document.getElementById('search').value||'').toLowerCase();
    const from=document.getElementById('dateFrom').value, to=document.getElementById('dateTo').value;
    let filtered=allSessions.filter(s=>{
        if(search&&!s.title.toLowerCase().includes(search))return false;
        if(from&&s.updatedAt&&s.updatedAt<from)return false;
        if(to&&s.updatedAt&&s.updatedAt>to+'T23:59:59')return false;
        return true;
    });
    const list=document.getElementById('list');
    if(!filtered.length){list.innerHTML='<div class="note">暂无匹配的会话</div>';return;}
    list.innerHTML=filtered.map(s=>`<div class="session-card" onclick="openChat('${s.sessionId}')">
        <div class="info"><div class="title">${esc(s.title)}</div><div class="meta">${s.updatedAt? s.updatedAt.substring(0,10):''} · ${s.pinned?'📌已置顶 · ':''}${s.updatedAt? s.updatedAt.substring(11,16):''}</div></div>
        <div class="actions" onclick="event.stopPropagation()">
            <button class="btn-sm btn-pin" onclick="togglePin('${s.sessionId}',${s.pinned})">${s.pinned?'取消置顶':'置顶'}</button>
            <button class="btn-sm btn-ghost" onclick="rename('${s.sessionId}','${esc(s.title)}')">重命名</button>
            <button class="btn-sm btn-del" onclick="del('${s.sessionId}')">删除</button>
        </div></div>`).join('');
}
function openChat(sid){window.location.href='/chat.html?session='+sid;}
async function togglePin(sid,cur){await fetch('/api/llm/sessions/'+sid,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({pinned:!cur})});load();}
async function rename(sid,old){const v=prompt('修改名称',old);if(!v||v===old)return;await fetch('/api/llm/sessions/'+sid,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:v})});load();}
async function del(sid){if(!await showConfirm('删除此会话及全部聊天记录？'))return;await fetch('/api/llm/sessions/'+sid,{method:'DELETE'});load();}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
load();
</script>
</body>
</html>
