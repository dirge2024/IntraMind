<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>LocalRAG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fefefe; color: #222; display: flex; min-height: 100vh; }
.sidebar { padding: 24px 20px; display: flex; flex-direction: column; gap: 4px; background: #f0f7ff; border-right: 1px solid #dceaf5; flex-shrink: 0; }
.sidebar .brand { font-size: 15px; font-weight: 700; color: #1e3a5f; margin-bottom: 12px; }
.sidebar a { display: block; padding: 7px 14px; color: #3b6ba5; text-decoration: none; font-size: 13.5px; border-radius: 6px; transition: .15s; white-space: nowrap; }
.sidebar a:hover { background: #dceaf5; }
.sidebar a.active { background: #2563eb; color: #fff; font-weight: 600; }
.main { flex: 1; }
.topbar { padding: 14px 28px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; }
.topbar h1 { font-size: 16px; font-weight: 600; }
.content { padding: 28px; max-width: 900px; }
.hero h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.hero p { color: #666; font-size: 14px; line-height: 1.7; margin-bottom: 16px; }
.pipeline { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #999; flex-wrap: wrap; padding: 12px 0; }
.pipeline .s { padding: 3px 10px; border: 1px solid #e0e0e0; border-radius: 100px; font-weight: 600; white-space: nowrap; }
.pipeline .s.done { border-color: #a7f0ba; background: #ebfbee; color: #1b7a30; }
.pipeline .sep { color: #ccc; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.tile { padding: 20px; border: 1px solid #eee; border-radius: 8px; background: #fff; }
.tile .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: #aaa; margin-bottom: 6px; }
.tile .val { font-family: 'JetBrains Mono', 'Cascadia Code', monospace; font-size: 11.5px; color: #555; line-height: 1.6; word-break: break-all; }
a { color: #2563eb; }
</style>
</head>
<body>
<div class="sidebar">
    <div class="brand">LocalRAG</div>
    <a href="/upload.html">上传文件</a>
    <a href="/kb.html">知识库</a>
    <a href="/chat.html">对话</a>
</div>
<div class="main">
    <div class="topbar"><h1>控制台</h1></div>
    <div class="content">
        <div class="hero">
            <h2>上传文档，智能问答</h2>
            <p>文件上传后自动解析分块、向量化存入 ES，通过大模型进行检索增强生成。</p>
            <div class="pipeline">
                <span class="s done">上传</span><span class="sep">→</span>
                <span class="s done">解析</span><span class="sep">→</span>
                <span class="s done">分块</span><span class="sep">→</span>
                <span class="s done">向量化</span><span class="sep">→</span>
                <span class="s done">入库</span><span class="sep">→</span>
                <span class="s">检索回答</span>
            </div>
        </div>
        <div class="grid">
            <div class="tile">
                <div class="lbl">ES 数据查询</div>
                <div class="val">curl -u elastic:wsy2642@ localhost:9200/localrag-chunks/_count</div>
            </div>
            <div class="tile">
                <div class="lbl">MinIO Console</div>
                <div class="val"><a href="http://localhost:19001" target="_blank">localhost:19001</a> — dirge / wsy2642@</div>
            </div>
            <div class="tile">
                <div class="lbl">健康检查</div>
                <div class="val"><a href="/api/health" target="_blank">/api/health</a></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
