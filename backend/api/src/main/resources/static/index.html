<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>LocalRAG</title>
<link rel="stylesheet" href="/common.css">
<style>
.content { flex: 1; padding: 28px; max-width: 900px; }
.hero h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.hero p { color: #777; font-size: 14px; line-height: 1.7; }
.steps { display: flex; align-items: center; gap: 6px; padding: 14px 0; font-size: 12px; color: #bbb; flex-wrap: wrap; }
.steps .s { padding: 4px 12px; border: 1px solid #e0e0e0; border-radius: 100px; font-weight: 600; white-space: nowrap; background: #fff; }
.steps .s.done { border-color: #c4b5fd; background: #f5f3ff; color: #6d28d9; }
.steps .sep { color: #ccc; font-size: 14px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.card { padding: 20px; border-radius: 14px; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.card .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: #aaa; margin-bottom: 6px; }
.card .val { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #666; line-height: 1.7; word-break: break-all; }
a { color: #7c3aed; }
</style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><div class="logo">R</div>LocalRAG</div>
    <nav>
        <a href="/upload.html">&#128196; 文件上传</a>
        <a href="/kb.html">&#128451; 知识库</a>
        <a href="/chat.html">&#128172; 对话助手</a>
        <a href="/sessions.html">&#128337; 历史会话</a>
    </nav>
</div>
<div class="main">
    <div class="topbar"><h1>控制台</h1></div>
    <div class="content">
        <div class="hero">
            <h2>上传文档，智能问答</h2>
            <p>文件上传后自动解析分块、向量化存入 ES，通过大模型进行检索增强生成。</p>
            <div class="steps">
                <span class="s done">上传</span><span class="sep">→</span>
                <span class="s done">解析</span><span class="sep">→</span>
                <span class="s done">分块</span><span class="sep">→</span>
                <span class="s done">向量化</span><span class="sep">→</span>
                <span class="s done">入库</span><span class="sep">→</span>
                <span class="s">检索回答</span>
            </div>
        </div>
        <div class="grid">
            <div class="card"><div class="lbl">ES 数据查询</div><div class="val">curl -u elastic:wsy2642@<br>localhost:9200/localrag-chunks/_count</div></div>
            <div class="card"><div class="lbl">MinIO Console</div><div class="val"><a href="http://localhost:19001">localhost:19001</a><br>dirge / wsy2642@</div></div>
            <div class="card"><div class="lbl">健康检查</div><div class="val"><a href="/api/health">/api/health</a></div></div>
        </div>
    </div>
</div>
</body>
</html>
